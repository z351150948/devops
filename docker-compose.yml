services:
  sxdevops:
    build:
      context: .
      dockerfile: Dockerfile
    image: sxdevops:latest
    container_name: sxdevops-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_ENGINE: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: sxdevops
      MYSQL_USER: sxdevops
      MYSQL_PASSWORD: sxdevops_password
      REDIS_URL: redis://redis:6379/0
      CHANNEL_REDIS_URL: redis://redis:6379/1
      SECRET_KEY: sxdevops-change-me-in-production
      DEBUG: "0"
      CORS_ALLOW_ALL_ORIGINS: "1"
      SXDEVOPS_WAIT_FOR_DB: "1"
      SXDEVOPS_MIGRATE: "1"
      SXDEVOPS_SEED_DATA: "1"
      SXDEVOPS_SEED_TEMPLATES: "1"
    ports:
      - "8000:8000"

  mysql:
    image: mysql:8.0
    container_name: sxdevops-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: sxdevops
      MYSQL_USER: sxdevops
      MYSQL_PASSWORD: sxdevops_password
      MYSQL_ROOT_PASSWORD: sxdevops_root_password
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: sxdevops-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  redis_data:
